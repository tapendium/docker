version: 2
updates:
  - package-ecosystem: 'docker'
    directory: '/cfn-lint'
    open-pull-requests-limit: 2
    schedule:
      interval: 'daily'
      time: '06:00'
      timezone: 'Australia/Melbourne'
    labels:
      - dependencies
      # Prevents `pr_branch_updater` workflow from updating
      # PR branches created by dependabot. Label name must match
      # the SKIP_UPDATE_LABEL environment
      - skipupdate
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
      exclude:
        - '@tapendium/*'

  - package-ecosystem: 'docker'
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
      exclude:
        - "@tapendium/*"
    directory: '/node-awscli-jq'
    open-pull-requests-limit: 2
    schedule:
      interval: 'daily'
      time: '06:00'
      timezone: 'Australia/Melbourne'
    labels:
      - dependencies
      # Prevents `pr_branch_updater` workflow from updating
      # PR branches created by dependabot. Label name must match
      # the SKIP_UPDATE_LABEL environment
      - skipupdate
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
      exclude:
        - '@tapendium/*'

  - package-ecosystem: 'docker'
    directory: '/node18-awscli-jq'
    open-pull-requests-limit: 2
    schedule:
      interval: 'daily'
      time: '06:00'
      timezone: 'Australia/Melbourne'
    labels:
      - dependencies
      # Prevents `pr_branch_updater` workflow from updating
      # PR branches created by dependabot. Label name must match
      # the SKIP_UPDATE_LABEL environment
      - skipupdate
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
      exclude:
        - '@tapendium/*'
